version: 2

models:
  - name: dim_pacientes
    description: >
      Dimensão de pacientes. Aplica a regra "mais novo ganha" sobre o histórico
      de versões de cada paciente na staging, mantendo apenas o registro mais
      recente por delivery_date. Inclui dados cadastrais, contato e localização.
    columns:
      - name: id_paciente
        description: "Identificador único do paciente (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_completo
        description: "Nome completo do paciente, capitalizado corretamente (preposições em minúsculo)"

      - name: sexo
        description: "Sexo biológico do paciente, traduzido para português (Masculino/Feminino)"

      - name: data_nascimento
        description: "Data de nascimento do paciente"

      - name: idade
        description: "Idade do paciente em anos completos, calculada a partir da data_nascimento"

      - name: cpf
        description: "CPF do paciente, sem espaços extras (trim aplicado)"

      - name: telefone_celular
        description: "Telefone celular de contato do paciente"

      - name: email
        description: "Email do paciente, normalizado em minúsculo"

      - name: bairro
        description: "Bairro de residência do paciente, capitalizado"

      - name: cidade
        description: "Cidade de residência do paciente, capitalizada"

      - name: estado
        description: "Sigla do estado de residência do paciente (ex: RJ, SP)"

  - name: dim_profissionais
    description: >
      Dimensão de profissionais de saúde. Aplica "mais novo ganha" sobre
      o histórico de versões de cada profissional na staging. Inclui dados
      cadastrais, contato e atuação profissional (especialidade, conselho).
    columns:
      - name: id_profissional
        description: "Identificador único do profissional (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_completo
        description: "Nome completo do profissional, capitalizado corretamente"

      - name: sexo
        description: "Sexo biológico do profissional, traduzido para português"

      - name: data_nascimento
        description: "Data de nascimento do profissional"

      - name: idade
        description: "Idade do profissional em anos completos"

      - name: cpf
        description: "CPF do profissional, sem espaços extras"

      - name: telefone
        description: "Telefone de contato do profissional"

      - name: email
        description: "Email do profissional, normalizado em minúsculo"

      - name: especialidade
        description: "Especialidade médica/profissional declarada"

      - name: numero_conselho
        description: "Número de registro no conselho profissional (CRM, COREN, etc.)"

      - name: tipo_conselho
        description: "Tipo do conselho profissional (CRM, COREN, CREFITO, etc.)"
  - name: dim_unidades
    description: >
      Dimensão de unidades de saúde. Aplica "mais novo ganha" sobre o
      histórico de versões de cada unidade na staging. Inclui identificação,
      contato e localização. Corrige problemas de encoding HTML herdados
      de cadastros legados.
    columns:
      - name: id_unidade
        description: "Identificador único da unidade (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_unidade
        description: "Nome da unidade de saúde, com encoding HTML corrigido (não capitalizado, pois pode conter siglas e marcadores como [LEGADO])"

      - name: status
        description: "Status da unidade, traduzido para português (Ativo/Suspenso/Inativo)"

      - name: telefone
        description: "Telefone de contato da unidade"

      - name: endereco
        description: "Endereço completo da unidade em texto"

      - name: bairro
        description: "Bairro onde está localizada a unidade, capitalizado"

      - name: cidade
        description: "Cidade onde está localizada a unidade, capitalizada"

      - name: estado
        description: "Sigla do estado onde está localizada a unidade"
  - name: fato_atendimentos
    description: >
      Fato de atendimentos. Aplica "mais novo ganha" sobre o histórico de
      versões de cada atendimento na staging, já que um encounter pode
      permanecer em status "in-progress" por várias entregas antes de
      finalizar. Uma linha por atendimento, pronta para contagem direta.
    columns:
      - name: id_atendimento
        description: "Identificador único do atendimento (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: id_unidade
        description: "Referência à unidade de saúde (dim_unidades)"

      - name: id_profissional
        description: "Referência ao profissional principal (dim_profissionais)"

      - name: id_profissional_secundario
        description: "Referência ao profissional secundário, quando houver (dim_profissionais)"

      - name: id_agendamento
        description: "Referência ao agendamento de origem do atendimento"

      - name: id_convenio
        description: "Referência ao convênio utilizado no atendimento, quando houver"

      - name: status
        description: "Status do atendimento, traduzido para português"

      - name: classificacao
        description: "Classificação do atendimento (Ambulatorial, Emergência, Internação, etc.), traduzida"

      - name: tipo_atendimento
        description: "Tipo do atendimento conforme registrado no sistema"

      - name: data_inicio
        description: "Data e hora de início do atendimento, no horário de Brasília"

      - name: data_fim
        description: "Data e hora de término do atendimento, no horário de Brasília (pode ser nulo se não finalizado)"

      - name: duracao_minutos
        description: "Duração do atendimento em minutos, calculada a partir de data_inicio e data_fim"
  - name: fato_agendamentos
    description: >
      Fato de agendamentos. Aplica "mais novo ganha" sobre o histórico de
      versões de cada agendamento na staging — um agendamento pode ser
      remarcado várias vezes antes de se concretizar, então a versão mais
      recente reflete o estado final (data efetiva e status atual).
    columns:
      - name: id_agendamento
        description: "Identificador único do agendamento (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: id_unidade
        description: "Referência à unidade de saúde (dim_unidades)"

      - name: id_profissional
        description: "Referência ao profissional principal (dim_profissionais)"

      - name: id_profissional_secundario
        description: "Referência ao profissional secundário, quando houver (dim_profissionais)"

      - name: id_convenio
        description: "Referência ao convênio utilizado, quando houver"

      - name: status
        description: "Status do agendamento, traduzido para português"

      - name: data_inicio
        description: "Data e hora de início do agendamento (versão final), no horário de Brasília"

      - name: data_fim
        description: "Data e hora de término do agendamento (versão final), no horário de Brasília"

      - name: duracao_minutos
        description: "Duração planejada do agendamento em minutos"

      - name: tipo_agendamento
        description: "Tipo/motivo do agendamento (ex: Consulta de Rotina)"

      - name: tipo_servico
        description: "Serviço associado ao agendamento (ex: Melhor Idade - Visita Médica)"

      - name: motivo_cancelamento
        description: "Motivo do cancelamento, quando aplicável"

      - name: observacao
        description: "Observações/comentários registrados no agendamento"

      - name: prioridade
        description: "Nível de prioridade do agendamento"

      - name: tipo_presenca
        description: "Modalidade de atendimento (Presencial, Teleconsulta, etc.)"

      - name: status_atendimento
        description: "Status detalhado do atendimento associado ao agendamento"
  - name: dim_carteira_saude
    description: >
      Dimensão de convênios/planos de saúde. Aplica "mais novo ganha" sobre
      o histórico de versões de cada convênio na staging. Um paciente pode
      ter múltiplos convênios ao longo do tempo, e um convênio pode cobrir
      vários beneficiários — a granularidade é por coverage_id, não por paciente.
    columns:
      - name: id_convenio
        description: "Identificador único do convênio (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: id_paciente_titular
        description: "Referência ao paciente titular do plano (dim_pacientes)"

      - name: id_paciente_beneficiario
        description: "Referência ao paciente beneficiário/usuário do plano (dim_pacientes)"

      - name: nome_operadora
        description: "Nome da operadora/seguradora do plano de saúde"

      - name: nome_plano
        description: "Nome do plano de saúde"

      - name: numero_carteira_dependente
        description: "Número da carteirinha do dependente/beneficiário"

      - name: numero_carteira_titular
        description: "Número da carteirinha do titular do plano"

      - name: status
        description: "Status do convênio, traduzido para português (Ativo/Cancelado/Rascunho/Erro de registro)"

      - name: data_inicio_vigencia
        description: "Data de início da vigência do plano"

      - name: data_fim_vigencia
        description: "Data de fim da vigência do plano"
  - name: fato_programas
    description: >
      Fato de episódios de cuidado (vínculo paciente-programa de saúde).
      Aplica três camadas de tratamento: normalização do nome do programa
      (corrige inconsistência de capitalização na fonte), "mais novo ganha"
      por episode_of_care_id, e deduplicação por chave de negócio
      (paciente + programa + data de admissão) para corrigir um bug
      conhecido da Prontlife que gera múltiplos episode_of_care_id para
      o mesmo vínculo lógico.
    columns:
      - name: id_episodio
        description: "Identificador único do episódio de cuidado (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: nome_programa
        description: "Nome do programa de saúde, normalizado (capitalização padronizada)"

      - name: id_gestor
        description: "Referência ao profissional gestor do caso (dim_profissionais)"

      - name: nome_gestor
        description: "Nome do gestor do caso"

      - name: papel_gestor
        description: "Papel/função do gestor (ex: Gestor de Enfermagem)"

      - name: status
        description: "Status do episódio, traduzido para português (Ativo/Inativo)"

      - name: data_admissao
        description: "Data de admissão do paciente no programa, no horário de Brasília"

      - name: data_fim_prevista
        description: "Data de fim prevista do acompanhamento, no horário de Brasília"

      - name: data_inativacao
        description: "Data e hora em que o episódio foi efetivamente inativado, no horário de Brasília"

      - name: observacao
        description: "Observações registradas sobre o episódio"
  - name: fato_diagnosticos
    description: >
      Fato de diagnósticos registrados no contexto de um atendimento.
      Aplica "mais novo ganha" por condition_id. O registrante pode ser
      um profissional ou o próprio paciente (pré-consulta).
    columns:
      - name: id_diagnostico
        description: "Identificador único do diagnóstico (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o diagnóstico (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o diagnóstico"
      - name: codigo_cid10
        description: "Código CID-10 do diagnóstico"
      - name: descricao_cid10
        description: "Descrição do CID-10, sem o código colado no texto"
      - name: status_clinico
        description: "Status clínico traduzido"
      - name: status_verificacao
        description: "Status de verificação traduzido"
      - name: observacao
        description: "Observação registrada"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"

  - name: fato_diagnosticos_hpp
    description: >
      Fato de diagnósticos/HPP (histórico pessoal de doenças). Aplica
      "mais novo ganha" por condition_id. O registrante pode ser um
      profissional ou o próprio paciente.
    columns:
      - name: id_diagnostico
        description: "Identificador único do diagnóstico (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o diagnóstico (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o diagnóstico"
      - name: nome_diagnostico
        description: "Nome/descrição do diagnóstico"
      - name: codigo_cid10
        description: "Código CID-10 do diagnóstico"
      - name: descricao_cid10
        description: "Descrição do CID-10"
      - name: categoria
        description: "Categoria traduzida"
      - name: gravidade
        description: "Gravidade traduzida"
      - name: status_clinico
        description: "Status clínico traduzido"
      - name: status_verificacao
        description: "Status de verificação traduzido"
      - name: observacao
        description: "Observação registrada"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"
  - name: fato_exame_fisico
    description: >
      Fato de medidas do exame físico (sinais vitais e antropometria).
      Aplica "mais novo ganha" por observation_id. Nome do registrante
      é limpo (CRM/CREFITO removido quando colado ao nome).
    columns:
      - name: id_medicao
        description: "Identificador único da medição (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou a medição (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou a medição, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame/medida, traduzido para português"
      - name: valor
        description: "Valor da medida simples (peso, altura, FC, etc.)"
      - name: unidade
        description: "Unidade do valor simples"
      - name: pressao_sistolica
        description: "Pressão sistólica, quando a medida é pressão arterial"
      - name: pressao_diastolica
        description: "Pressão diastólica, quando a medida é pressão arterial"
      - name: pressao_media
        description: "Pressão arterial média, quando disponível"
      - name: unidade_pressao
        description: "Unidade da pressão arterial (mmHg)"
      - name: status
        description: "Status da observação, traduzido"
      - name: data_medicao
        description: "Data e hora em que a medição ocorreu, horário de Brasília"
  - name: fato_exame_lab
    description: >
      Fato de exames de laboratório. Aplica "mais novo ganha" por
      observation_id. Resultado numérico vem direto do valueQuantity
      (campo valor_resultado); quando o laboratório retorna o resultado
      em formato não padrão (vírgula decimal, qualitativo, comparador,
      valor composto), ele cai em resultado_texto e valor_resultado fica
      nulo — esses casos ficam disponíveis para revisão na mart de
      qualidade (qualidade_exame_lab).
    columns:
      - name: id_exame
        description: "Identificador único do exame (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o exame (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o exame, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame, padronizado (variações de nomenclatura unificadas)"
      - name: valor_resultado
        description: "Resultado numérico do exame, quando disponível via valueQuantity"
      - name: unidade
        description: "Unidade do resultado numérico"
      - name: resultado_texto
        description: "Resultado em texto livre, usado quando o laboratório não retornou um valueQuantity válido"
      - name: status
        description: "Status do exame, traduzido"
      - name: data_exame
        description: "Data e hora em que o exame foi realizado, horário de Brasília"
  - name: fato_exame_imagem
    description: >
      Fato de exames de imagem (ultrassom, ressonância, tomografia, ECG,
      mamografia, densitometria óssea, entre outros). Aplica "mais novo
      ganha" por observation_id. Laudo em texto livre e anexo são campos
      sensíveis (LGPD). Usa effective_datetime (data de realização do
      exame), não issued (data de lançamento do laudo no sistema).
    columns:
      - name: id_exame
        description: "Identificador único do exame (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o exame (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o exame, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame de imagem (ultrassom, ressonância, tomografia, etc.)"
      - name: laudo_texto
        description: "Laudo do exame em texto livre — dado sensível (LGPD)"
      - name: attachment_url
        description: "URL do anexo do laudo, quando o resultado foi enviado como imagem/foto"
      - name: attachment_title
        description: "Título do arquivo anexado"
      - name: status
        description: "Status do exame, traduzido"
      - name: data_exame
        description: "Data em que o exame foi realizado (effective_datetime), horário de Brasília"
  - name: fato_vacinacao
    description: >
      Fato de vacinas/imunizações. Aplica duas camadas de dedup: "mais
      novo ganha" por immunization_id (resolve múltiplas versões do
      mesmo registro), e dedup por chave de negócio (paciente + nome
      da vacina + data de aplicação), pois a Prontlife gera um
      immunization_id novo a cada entrega para o mesmo evento de
      vacinação — o mesmo bug visto no fato_programas.
    columns:
      - name: id_vacina
        description: "Identificador da vacina (referência ao registro mais recente após dedup)"
        tests:
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_registrante
        description: "ID de quem registrou a vacina (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_vacina
        description: "Nome da vacina aplicada"
      - name: status
        description: "Status da vacinação, traduzido (Completo/Erro de registro/Não realizado)"
      - name: observacao
        description: "Observações sobre a vacinação (dose, lote, detalhes adicionais)"
      - name: data_registro
        description: "Data e hora em que o registro foi lançado no sistema, horário de Brasília"
      - name: data_aplicacao
        description: "Data e hora em que a vacina foi efetivamente aplicada, horário de Brasília"
  - name: fato_medicacao_prescrita
    description: >
      Fato de prescrições médicas. Aplica "mais novo ganha" por
      medication_request_id — uma prescrição pode evoluir (dose
      ajustada, status mudando entre ativa/concluída/reativada),
      e a versão mais recente reflete o estado real e atual do
      tratamento. medication_id não é confiável como referência
      (valores genéricos como "#Medication1" repetem entre
      medicamentos diferentes), por isso não foi incluído — o
      nome do medicamento é a fonte de verdade.
    columns:
      - name: id_prescricao
        description: "Identificador único da prescrição (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento, quando disponível (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou a prescrição"
      - name: nome_registrante
        description: "Nome de quem registrou a prescrição, sem cargo/registro colado"
      - name: id_solicitante
        description: "ID de quem solicitou a prescrição"
      - name: nome_solicitante
        description: "Nome de quem solicitou a prescrição, sem cargo/registro colado"
      - name: nome_medicamento
        description: "Nome do medicamento prescrito, incluindo apresentação/dosagem no texto"
      - name: categoria
        description: "Código de categoria da prescrição"
      - name: tipo_terapia
        description: "Tipo de terapia traduzido (Contínuo/Agudo-Pontual)"
      - name: tipo_receituario
        description: "Tipo de receituário (Comum, Receita Branca, Especial, etc.)"
      - name: posologia_texto
        description: "Texto completo da posologia, como prescrito"
      - name: via_administracao
        description: "Via de administração do medicamento"
      - name: valor_dose
        description: "Valor numérico da dose, quando estruturado"
      - name: unidade_dose
        description: "Unidade da dose (comprimido, mL, mg, etc.)"
      - name: frequencia
        description: "Frequência numérica de administração"
      - name: unidade_frequencia
        description: "Unidade da frequência (d=dia, wk=semana, mo=mês)"
      - name: horario
        description: "Período do dia para administração, traduzido (Manhã/Tarde/Noite) quando aplicável; mantém valor original se for outro formato (ex: horário específico)"
      - name: valor_duracao
        description: "Valor numérico da duração do tratamento"
      - name: unidade_duracao
        description: "Unidade da duração (d=dia, wk=semana, mo=mês)"
      - name: uso_se_necessario
        description: "Indica se o uso é condicional (SOS/se necessário)"
      - name: status
        description: "Status da prescrição, traduzido (Ativa/Concluída/Cancelada/Interrompida/Em espera/Erro de registro/Rascunho)"
      - name: observacao
        description: "Observações adicionais sobre a prescrição"
      - name: data_prescricao
        description: "Data e hora em que a prescrição foi autorizada/escrita, horário de Brasília"
  - name: fato_medicacao_hpp
    description: >
      Fato de medicamentos declarados/em uso pelo paciente. Aplica "mais
      novo ganha" por medication_statement_id, usando delivery_date e
      date_asserted como desempate, para manter o estado atual do
      medicamento declarado. Um medicamento pode aparecer como ativo,
      completo, parado ou cancelado conforme sua situação mais recente.
    columns:
      - name: id_uso_medicamento
        description: "Identificador único do uso/declaracão de medicamento (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: id_atendimento
        description: "Referência ao atendimento, quando disponível (fato_atendimentos)"

      - name: id_registrante
        description: "ID de quem registrou a declaração do medicamento"

      - name: tipo_registrante
        description: "Tipo do registrante, traduzido: Profissional ou Paciente"

      - name: nome_registrante
        description: "Nome de quem registrou a declaração do medicamento"

      - name: nome_medicamento
        description: "Nome do medicamento declarado pelo paciente"

      - name: uso_continuo
        description: "Indica se o medicamento é de uso contínuo"

      - name: posologia_texto
        description: "Texto completo da posologia informada"

      - name: via_administracao
        description: "Via de administração do medicamento"

      - name: valor_dose
        description: "Valor numérico da dose, quando estruturado"

      - name: unidade_dose
        description: "Unidade da dose"

      - name: status
        description: "Status atual do uso do medicamento, traduzido (Ativo/Aguardando/Cancelado/Completo/Erro/Parado/Rascunho/Desconhecido)"

      - name: observacao
        description: "Observações registradas sobre o medicamento"

      - name: data_declaracao
        description: "Data e hora em que o uso do medicamento foi declarado/confirmado, horário de Brasília"
  - name: dim_convenios
    description: >
      Dimensão de convênios/plano de saúde. Mantém uma linha por
      healthinsurance_id, considerando o registro mais recente pelo
      delivery_date.
    columns:
      - name: id_convenio
        description: "Identificador único do convênio"
        tests:
          - unique
          - not_null

      - name: nome_convenio
        description: "Nome do convênio ou plano de saúde"

      - name: razao_social
        description: "Razão social vinculada ao convênio"

      - name: status
        description: "Status atual do convênio, traduzido como Ativo ou Inativo"
  - name: dim_planos_convenios
    description: >
      Dimensão de planos de convênio. Mantém uma linha por
      healthinsuranceplan_id, considerando o registro mais recente
      pelo delivery_date.
    columns:
      - name: id_plano_convenio
        description: "Identificador único do plano de convênio"
        tests:
          - unique
          - not_null

      - name: id_convenio
        description: "Referência ao convênio ao qual o plano pertence"

      - name: nome_plano
        description: "Nome do plano de convênio"

      - name: status
        description: "Status atual do plano, traduzido como Ativo ou Inativo"
  - name: fato_escore_risco
    description: >
      Fato de avaliações de risco realizadas para pacientes. Mantém uma
      linha por risk_assessment_id, considerando a versão mais recente
      pelo delivery_date e occurrence_datetime. Contém o resultado,
      predição e status da avaliação de risco.
    columns:
      - name: id_escore_risco
        description: "Identificador único da avaliação de risco"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente avaliado"

      - name: id_atendimento
        description: "Referência ao atendimento relacionado à avaliação"

      - name: id_questionario_resposta
        description: "Referência ao questionário que originou a avaliação"

      - name: id_registrante
        description: "Identificador de quem registrou a avaliação"

      - name: tipo_registrante
        description: "Tipo do registrante, traduzido como Profissional ou Dispositivo"

      - name: nome_registrante
        description: "Nome do profissional ou dispositivo que registrou a avaliação"

      - name: nome_escore
        description: "Nome do escore ou método utilizado na avaliação"

      - name: codigo_predicao
        description: "Código da classificação ou predição gerada pelo escore"

      - name: predicao
        description: "Resultado ou classificação gerada pelo escore"

      - name: justificativa_predicao
        description: "Justificativa clínica da predição, quando disponível"

      - name: valor_escore
        description: "Valor numérico obtido na avaliação"

      - name: status
        description: "Status da avaliação, traduzido como Final ou Preliminar"

      - name: data_ocorrencia
        description: "Data e hora em que a avaliação de risco ocorreu, em horário de Brasília"
  - name: fato_alergias_intolerancias
    description: >
      Fato de alergias e intolerâncias registradas para pacientes.
      Mantém uma linha por allergy_id, considerando o registro mais
      recente pelo delivery_date e recorded_date. Contém informações
      sobre a substância, status clínico e validação da alergia.
    columns:
      - name: id_alergia_intolerancia
        description: "Identificador único da alergia ou intolerância"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente"

      - name: id_atendimento
        description: "Referência ao atendimento relacionado ao registro"

      - name: id_registrante
        description: "Identificador de quem registrou a alergia ou intolerância"

      - name: tipo_registrante
        description: "Tipo do registrante, traduzido como Profissional ou Paciente"

      - name: nome_registrante
        description: "Nome de quem registrou a alergia ou intolerância"

      - name: tipo_alergia
        description: "Classificação do registro como Alergia ou Intolerância"

      - name: nome_substancia
        description: "Nome da substância associada à alergia ou intolerância"

      - name: status_clinico
        description: "Status clínico da alergia ou intolerância"

      - name: status_verificacao
        description: "Status de validação do registro, como Confirmado ou Não confirmado"

      - name: observacao
        description: "Observações registradas sobre a alergia ou intolerância"

      - name: data_registro
        description: "Data e hora em que a alergia ou intolerância foi registrada, em horário de Brasília"
  - name: fato_historico_familiar
    description: >
      Fato de histórico familiar dos pacientes. Mantém uma linha por
      family_history_id, considerando a versão mais recente do registro
      com base em delivery_date e recorded_date. Contém informações
      sobre condições de saúde em familiares, parentesco, CID10 e
      validação clínica.
    columns:
      - name: id_historico_familiar
        description: "Identificador único do histórico familiar"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente"

      - name: id_atendimento
        description: "Referência ao atendimento relacionado ao registro"

      - name: id_registrante
        description: "Identificador de quem registrou o histórico familiar"

      - name: tipo_registrante
        description: "Indica se o registro foi realizado por um Profissional ou pelo próprio Paciente"

      - name: nome_registrante
        description: "Nome de quem registrou o histórico familiar"

      - name: parentesco
        description: "Grau de parentesco do familiar relacionado ao histórico"

      - name: condicao
        description: "Condição de saúde relatada no histórico familiar"

      - name: cid10
        description: "Código CID-10 associado à condição, quando informado"

      - name: descricao_cid10
        description: "Descrição do código CID-10 associado à condição"

      - name: observacao
        description: "Observações adicionais registradas para o histórico familiar"

      - name: status
        description: "Status do histórico familiar"

      - name: status_verificacao
        description: "Status de validação clínica do histórico familiar"

      - name: data_registro
        description: "Data e hora em que o histórico familiar foi registrado, em horário de Brasília"
  - name: fato_encaminhamento
    description: >
      Fato de encaminhamentos a especialistas (category_code = 3457005,
      "Referral procedure" no SNOMED). Aplica dedup por
      service_request_id + authored_on, mantendo histórico de
      múltiplos encaminhamentos do mesmo paciente ao longo do tempo.
      A especialidade vem do campo performerType da origem.
    columns:
      - name: id_encaminhamento
        description: "Identificador do encaminhamento (não único isoladamente — combinar com data_solicitacao)"
        tests:
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_solicitante
        description: "ID do profissional que fez o encaminhamento"
      - name: especialidade
        description: "Especialidade para a qual o paciente foi encaminhado (Nutrição, Psicologia, Nefrologia, etc.)"
      - name: tipo_pedido
        description: "Tipo de pedido, traduzido (Ordem/Plano)"
      - name: status
        description: "Status do encaminhamento, traduzido"
      - name: motivo
        description: "Motivo clínico do encaminhamento"
      - name: data_solicitacao
        description: "Data e hora da solicitação, horário de Brasília"

  - name: fato_solicitacao_exame
    description: >
      Fato de solicitações de exame (laboratório e imagem, category_code
      363679005 e 108252007). Aplica dedup por service_request_id +
      authored_on, mantendo histórico de renovações/repetições de
      solicitação ao longo do tempo.
    columns:
      - name: id_solicitacao
        description: "Identificador da solicitação (não único isoladamente — combinar com data_solicitacao)"
        tests:
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_solicitante
        description: "ID do profissional que solicitou o exame"
      - name: categoria
        description: "Categoria da solicitação: Exame de Imagem ou Exame de Laboratório"
      - name: nome_exame
        description: "Nome do exame solicitado"
      - name: tipo_imagem
        description: "Tipo de exame de imagem (Ultrassonografia, Ressonância, etc.), quando aplicável"
      - name: tipo_pedido
        description: "Tipo de pedido, traduzido (Ordem/Plano)"
      - name: status
        description: "Status da solicitação, traduzido"
      - name: motivo
        description: "Motivo clínico da solicitação"
      - name: data_solicitacao
        description: "Data e hora da solicitação, horário de Brasília"

  - name: fato_orientacao_saude
    description: >
      Fato de orientações de saúde diversas (category_code 405103001).
      Cobre fisioterapia, instruções de medicação, vacinas, monitoramento
      domiciliar, entre outros. Aplica dedup por service_request_id +
      authored_on, mantendo histórico de orientações ao longo do tempo.
    columns:
      - name: id_orientacao
        description: "Identificador da orientação (não único isoladamente — combinar com data_orientacao)"
        tests:
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_solicitante
        description: "ID do profissional que deu a orientação"
      - name: tipo_orientacao
        description: "Tipo de orientação (Fisioterapia, Outros, Exercícios, etc.)"
      - name: instrucao
        description: "Texto completo da instrução dada ao paciente"
      - name: periodicidade
        description: "Periodicidade da orientação (Pontual/Contínuo)"
      - name: status
        description: "Status da orientação, traduzido"
      - name: data_orientacao
        description: "Data e hora da orientação, horário de Brasília"
  - name: fato_procedimento_cirurgico
    description: >
      Fato de procedimentos cirúrgicos do HPP (recurso Procedure com
      código TUSS presente). Aplica "mais novo ganha" por procedure_id.
      Nome do procedimento limpo, removendo o texto "(TUSS - código)"
      redundante já que o código fica em coluna própria (tuss_code).
    columns:
      - name: id_procedimento
        description: "Identificador único do procedimento (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o procedimento (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou, sem cargo/registro colado"
      - name: nome_procedimento
        description: "Nome do procedimento cirúrgico, sem o código TUSS colado no texto"
      - name: tuss_code
        description: "Código TUSS do procedimento"
      - name: status
        description: "Status do procedimento, traduzido"
      - name: status_verificacao
        description: "Status de verificação, traduzido"
      - name: observacao
        description: "Observação registrada sobre o procedimento"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"

  - name: fato_internacao_hpp
    description: >
      Fato de internações e eventos de saúde do HPP (recurso Procedure
      sem código TUSS) — cobre condições/eventos como pneumonia,
      fraturas, histórico familiar de doença, e o valor-sentinela
      "Paciente Nega" (ausência de histórico). Aplica "mais novo ganha"
      por procedure_id.
    columns:
      - name: id_internacao
        description: "Identificador único do registro (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou, sem cargo/registro colado"
      - name: nome_evento
        description: "Nome do evento/condição de internação registrado, incluindo o caso 'Paciente Nega' quando aplicável"
      - name: status
        description: "Status do registro, traduzido"
      - name: status_verificacao
        description: "Status de verificação, traduzido"
      - name: observacao
        description: "Observação registrada sobre o evento"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"
  - name: fato_orientacao_nutricional
    description: >
      Fato de orientações/planos nutricionais (recurso NutritionOrder).
      Cobre desde orientações simples (ex: "beber 2L de água/dia") até
      planos alimentares completos e encaminhamentos para avaliação
      nutricional. Aplica "mais novo ganha" por nutrition_order_id.
    columns:
      - name: id_orientacao
        description: "Identificador único da orientação nutricional (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_solicitante
        description: "ID do profissional que fez a orientação/prescrição nutricional"
      - name: nome_solicitante
        description: "Nome do profissional, sem cargo/registro colado"
      - name: instrucao
        description: "Texto completo da orientação ou plano nutricional"
      - name: periodicidade
        description: "Periodicidade da orientação (Habitual/Pontual)"
      - name: tipo_pedido
        description: "Tipo de pedido, traduzido (Ordem/Plano)"
      - name: status
        description: "Status da orientação, traduzido"
      - name: data_orientacao
        description: "Data e hora da orientação, horário de Brasília"
  - name: fato_queixa
    description: >
      Fato de queixas/motivos de consulta, classificados pelo código
      CIAP (Classificação Internacional de Atenção Primária). Um
      atendimento pode gerar múltiplas queixas registradas. Aplica
      "mais novo ganha" por observation_id.
    columns:
      - name: id_queixa
        description: "Identificador único da queixa (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento onde a queixa foi registrada (fato_atendimentos)"
      - name: id_registrante
        description: "ID do profissional que registrou a queixa"
      - name: nome_registrante
        description: "Nome do profissional, sem cargo/registro colado"
      - name: codigo_ciap
        description: "Código CIAP (Classificação Internacional de Atenção Primária) da queixa"
      - name: nome_queixa
        description: "Descrição da queixa/motivo de consulta"
      - name: status
        description: "Status do registro, traduzido"
      - name: data_registro
        description: "Data e hora do registro, horário de Brasília"
  - name: fato_observacao_hpi
    description: >
      Fato de observações clínicas do tipo HPI (History of Present Illness),
      representando a história da doença atual registrada durante os atendimentos.
      Contém o texto livre da avaliação clínica, profissional responsável,
      status da observação e data do registro.
    columns:
      - name: id_observacao_hpi
        description: "Identificador único da observação HPI"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente"

      - name: id_atendimento
        description: "Referência ao atendimento relacionado à observação"

      - name: id_registrante
        description: "Identificador do profissional que registrou a observação"

      - name: nome_registrante
        description: "Nome do profissional que registrou a observação"

      - name: texto_hpi
        description: "Texto da história da doença atual (HPI), contendo a descrição clínica registrada durante o atendimento"

      - name: status
        description: "Status da observação clínica"

      - name: data_observacao
        description: "Data e hora em que a observação clínica foi registrada, em horário de Brasília"
  - name: fato_habitos
    description: >
      Fato de hábitos e estilo de vida dos pacientes. Mantém uma linha por
      observation_id, considerando a versão mais recente do registro com base
      em delivery_date e issued. Contém informações sobre atividade física,
      tabagismo, etilismo e outros hábitos declarados pelo paciente ou
      registrados por profissionais.
    columns:
      - name: id_habito
        description: "Identificador único do hábito registrado"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente"

      - name: id_atendimento
        description: "Referência ao atendimento relacionado ao hábito"

      - name: id_registrante
        description: "Identificador de quem registrou o hábito"

      - name: tipo_registrante
        description: "Indica se o registro foi realizado por um Profissional ou pelo próprio Paciente"

      - name: nome_registrante
        description: "Nome de quem registrou o hábito"

      - name: habito
        description: "Descrição do hábito ou estilo de vida registrado"

      - name: cigarros_por_dia
        description: "Quantidade de cigarros consumidos por dia, quando aplicável"

      - name: anos_tabagismo
        description: "Quantidade de anos de tabagismo, quando aplicável"

      - name: macos_por_ano
        description: "Quantidade de maços por ano (pack-years), quando aplicável"

      - name: doses_alcool_por_semana
        description: "Quantidade de doses de álcool consumidas por semana, quando aplicável"

      - name: observacao
        description: "Observações adicionais relacionadas ao hábito"

      - name: status
        description: "Status do registro do hábito"

      - name: data_emissao
        description: "Data e hora em que o hábito foi registrado, em horário de Brasília"
