version: 2

models:
  - name: dim_pacientes
    description: >
      Dimensão de pacientes. Aplica a regra "mais novo ganha" sobre o histórico
      de versões de cada paciente na staging, mantendo apenas o registro mais
      recente por delivery_date. Inclui dados cadastrais, contato e localização.
    columns:
      - name: id_paciente
        description: "Identificador único do paciente (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_completo
        description: "Nome completo do paciente, capitalizado corretamente (preposições em minúsculo)"

      - name: sexo
        description: "Sexo biológico do paciente, traduzido para português (Masculino/Feminino)"

      - name: data_nascimento
        description: "Data de nascimento do paciente"

      - name: idade
        description: "Idade do paciente em anos completos, calculada a partir da data_nascimento"

      - name: cpf
        description: "CPF do paciente, sem espaços extras (trim aplicado)"

      - name: telefone_celular
        description: "Telefone celular de contato do paciente"

      - name: email
        description: "Email do paciente, normalizado em minúsculo"

      - name: bairro
        description: "Bairro de residência do paciente, capitalizado"

      - name: cidade
        description: "Cidade de residência do paciente, capitalizada"

      - name: estado
        description: "Sigla do estado de residência do paciente (ex: RJ, SP)"

  - name: dim_profissionais
    description: >
      Dimensão de profissionais de saúde. Aplica "mais novo ganha" sobre
      o histórico de versões de cada profissional na staging. Inclui dados
      cadastrais, contato e atuação profissional (especialidade, conselho).
    columns:
      - name: id_profissional
        description: "Identificador único do profissional (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_completo
        description: "Nome completo do profissional, capitalizado corretamente"

      - name: sexo
        description: "Sexo biológico do profissional, traduzido para português"

      - name: data_nascimento
        description: "Data de nascimento do profissional"

      - name: idade
        description: "Idade do profissional em anos completos"

      - name: cpf
        description: "CPF do profissional, sem espaços extras"

      - name: telefone
        description: "Telefone de contato do profissional"

      - name: email
        description: "Email do profissional, normalizado em minúsculo"

      - name: especialidade
        description: "Especialidade médica/profissional declarada"

      - name: numero_conselho
        description: "Número de registro no conselho profissional (CRM, COREN, etc.)"

      - name: tipo_conselho
        description: "Tipo do conselho profissional (CRM, COREN, CREFITO, etc.)"
  - name: dim_unidades
    description: >
      Dimensão de unidades de saúde. Aplica "mais novo ganha" sobre o
      histórico de versões de cada unidade na staging. Inclui identificação,
      contato e localização. Corrige problemas de encoding HTML herdados
      de cadastros legados.
    columns:
      - name: id_unidade
        description: "Identificador único da unidade (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: nome_unidade
        description: "Nome da unidade de saúde, com encoding HTML corrigido (não capitalizado, pois pode conter siglas e marcadores como [LEGADO])"

      - name: status
        description: "Status da unidade, traduzido para português (Ativo/Suspenso/Inativo)"

      - name: telefone
        description: "Telefone de contato da unidade"

      - name: endereco
        description: "Endereço completo da unidade em texto"

      - name: bairro
        description: "Bairro onde está localizada a unidade, capitalizado"

      - name: cidade
        description: "Cidade onde está localizada a unidade, capitalizada"

      - name: estado
        description: "Sigla do estado onde está localizada a unidade"
  - name: fato_atendimentos
    description: >
      Fato de atendimentos. Aplica "mais novo ganha" sobre o histórico de
      versões de cada atendimento na staging, já que um encounter pode
      permanecer em status "in-progress" por várias entregas antes de
      finalizar. Uma linha por atendimento, pronta para contagem direta.
    columns:
      - name: id_atendimento
        description: "Identificador único do atendimento (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: id_unidade
        description: "Referência à unidade de saúde (dim_unidades)"

      - name: id_profissional
        description: "Referência ao profissional principal (dim_profissionais)"

      - name: id_profissional_secundario
        description: "Referência ao profissional secundário, quando houver (dim_profissionais)"

      - name: id_agendamento
        description: "Referência ao agendamento de origem do atendimento"

      - name: id_convenio
        description: "Referência ao convênio utilizado no atendimento, quando houver"

      - name: status
        description: "Status do atendimento, traduzido para português"

      - name: classificacao
        description: "Classificação do atendimento (Ambulatorial, Emergência, Internação, etc.), traduzida"

      - name: tipo_atendimento
        description: "Tipo do atendimento conforme registrado no sistema"

      - name: data_inicio
        description: "Data e hora de início do atendimento, no horário de Brasília"

      - name: data_fim
        description: "Data e hora de término do atendimento, no horário de Brasília (pode ser nulo se não finalizado)"

      - name: duracao_minutos
        description: "Duração do atendimento em minutos, calculada a partir de data_inicio e data_fim"
  - name: fato_agendamentos
    description: >
      Fato de agendamentos. Aplica "mais novo ganha" sobre o histórico de
      versões de cada agendamento na staging — um agendamento pode ser
      remarcado várias vezes antes de se concretizar, então a versão mais
      recente reflete o estado final (data efetiva e status atual).
    columns:
      - name: id_agendamento
        description: "Identificador único do agendamento (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: id_unidade
        description: "Referência à unidade de saúde (dim_unidades)"

      - name: id_profissional
        description: "Referência ao profissional principal (dim_profissionais)"

      - name: id_profissional_secundario
        description: "Referência ao profissional secundário, quando houver (dim_profissionais)"

      - name: id_convenio
        description: "Referência ao convênio utilizado, quando houver"

      - name: status
        description: "Status do agendamento, traduzido para português"

      - name: data_inicio
        description: "Data e hora de início do agendamento (versão final), no horário de Brasília"

      - name: data_fim
        description: "Data e hora de término do agendamento (versão final), no horário de Brasília"

      - name: duracao_minutos
        description: "Duração planejada do agendamento em minutos"

      - name: tipo_agendamento
        description: "Tipo/motivo do agendamento (ex: Consulta de Rotina)"

      - name: tipo_servico
        description: "Serviço associado ao agendamento (ex: Melhor Idade - Visita Médica)"

      - name: motivo_cancelamento
        description: "Motivo do cancelamento, quando aplicável"

      - name: observacao
        description: "Observações/comentários registrados no agendamento"

      - name: prioridade
        description: "Nível de prioridade do agendamento"

      - name: tipo_presenca
        description: "Modalidade de atendimento (Presencial, Teleconsulta, etc.)"

      - name: status_atendimento
        description: "Status detalhado do atendimento associado ao agendamento"
  - name: dim_convenios
    description: >
      Dimensão de convênios/planos de saúde. Aplica "mais novo ganha" sobre
      o histórico de versões de cada convênio na staging. Um paciente pode
      ter múltiplos convênios ao longo do tempo, e um convênio pode cobrir
      vários beneficiários — a granularidade é por coverage_id, não por paciente.
    columns:
      - name: id_convenio
        description: "Identificador único do convênio (chave primária da dimensão)"
        tests:
          - unique
          - not_null

      - name: id_paciente_titular
        description: "Referência ao paciente titular do plano (dim_pacientes)"

      - name: id_paciente_beneficiario
        description: "Referência ao paciente beneficiário/usuário do plano (dim_pacientes)"

      - name: nome_operadora
        description: "Nome da operadora/seguradora do plano de saúde"

      - name: nome_plano
        description: "Nome do plano de saúde"

      - name: numero_carteira_dependente
        description: "Número da carteirinha do dependente/beneficiário"

      - name: numero_carteira_titular
        description: "Número da carteirinha do titular do plano"

      - name: status
        description: "Status do convênio, traduzido para português (Ativo/Cancelado/Rascunho/Erro de registro)"

      - name: data_inicio_vigencia
        description: "Data de início da vigência do plano"

      - name: data_fim_vigencia
        description: "Data de fim da vigência do plano"
  - name: fato_programas
    description: >
      Fato de episódios de cuidado (vínculo paciente-programa de saúde).
      Aplica três camadas de tratamento: normalização do nome do programa
      (corrige inconsistência de capitalização na fonte), "mais novo ganha"
      por episode_of_care_id, e deduplicação por chave de negócio
      (paciente + programa + data de admissão) para corrigir um bug
      conhecido da Prontlife que gera múltiplos episode_of_care_id para
      o mesmo vínculo lógico.
    columns:
      - name: id_episodio
        description: "Identificador único do episódio de cuidado (chave primária do fato)"
        tests:
          - unique
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"

      - name: nome_programa
        description: "Nome do programa de saúde, normalizado (capitalização padronizada)"

      - name: id_gestor
        description: "Referência ao profissional gestor do caso (dim_profissionais)"

      - name: nome_gestor
        description: "Nome do gestor do caso"

      - name: papel_gestor
        description: "Papel/função do gestor (ex: Gestor de Enfermagem)"

      - name: status
        description: "Status do episódio, traduzido para português (Ativo/Inativo)"

      - name: data_admissao
        description: "Data de admissão do paciente no programa, no horário de Brasília"

      - name: data_fim_prevista
        description: "Data de fim prevista do acompanhamento, no horário de Brasília"

      - name: data_inativacao
        description: "Data e hora em que o episódio foi efetivamente inativado, no horário de Brasília"

      - name: observacao
        description: "Observações registradas sobre o episódio"
  - name: fato_diagnosticos
    description: >
      Fato de diagnósticos registrados no contexto de um atendimento.
      Aplica "mais novo ganha" por condition_id. O registrante pode ser
      um profissional ou o próprio paciente (pré-consulta).
    columns:
      - name: id_diagnostico
        description: "Identificador único do diagnóstico (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o diagnóstico (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o diagnóstico"
      - name: codigo_cid10
        description: "Código CID-10 do diagnóstico"
      - name: descricao_cid10
        description: "Descrição do CID-10, sem o código colado no texto"
      - name: status_clinico
        description: "Status clínico traduzido"
      - name: status_verificacao
        description: "Status de verificação traduzido"
      - name: observacao
        description: "Observação registrada"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"

  - name: fato_diagnosticos_hpp
    description: >
      Fato de diagnósticos/HPP (histórico pessoal de doenças). Aplica
      "mais novo ganha" por condition_id. O registrante pode ser um
      profissional ou o próprio paciente.
    columns:
      - name: id_diagnostico
        description: "Identificador único do diagnóstico (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o diagnóstico (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o diagnóstico"
      - name: nome_diagnostico
        description: "Nome/descrição do diagnóstico"
      - name: codigo_cid10
        description: "Código CID-10 do diagnóstico"
      - name: descricao_cid10
        description: "Descrição do CID-10"
      - name: categoria
        description: "Categoria traduzida"
      - name: gravidade
        description: "Gravidade traduzida"
      - name: status_clinico
        description: "Status clínico traduzido"
      - name: status_verificacao
        description: "Status de verificação traduzido"
      - name: observacao
        description: "Observação registrada"
      - name: data_registro
        description: "Data e hora de registro, horário de Brasília"
  - name: fato_exame_fisico
    description: >
      Fato de medidas do exame físico (sinais vitais e antropometria).
      Aplica "mais novo ganha" por observation_id. Nome do registrante
      é limpo (CRM/CREFITO removido quando colado ao nome).
    columns:
      - name: id_medicao
        description: "Identificador único da medição (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou a medição (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou a medição, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame/medida, traduzido para português"
      - name: valor
        description: "Valor da medida simples (peso, altura, FC, etc.)"
      - name: unidade
        description: "Unidade do valor simples"
      - name: pressao_sistolica
        description: "Pressão sistólica, quando a medida é pressão arterial"
      - name: pressao_diastolica
        description: "Pressão diastólica, quando a medida é pressão arterial"
      - name: pressao_media
        description: "Pressão arterial média, quando disponível"
      - name: unidade_pressao
        description: "Unidade da pressão arterial (mmHg)"
      - name: status
        description: "Status da observação, traduzido"
      - name: data_medicao
        description: "Data e hora em que a medição ocorreu, horário de Brasília"
  - name: fato_exame_lab
    description: >
      Fato de exames de laboratório. Aplica "mais novo ganha" por
      observation_id. Resultado numérico vem direto do valueQuantity
      (campo valor_resultado); quando o laboratório retorna o resultado
      em formato não padrão (vírgula decimal, qualitativo, comparador,
      valor composto), ele cai em resultado_texto e valor_resultado fica
      nulo — esses casos ficam disponíveis para revisão na mart de
      qualidade (qualidade_exame_lab).
    columns:
      - name: id_exame
        description: "Identificador único do exame (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o exame (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o exame, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame, padronizado (variações de nomenclatura unificadas)"
      - name: valor_resultado
        description: "Resultado numérico do exame, quando disponível via valueQuantity"
      - name: unidade
        description: "Unidade do resultado numérico"
      - name: resultado_texto
        description: "Resultado em texto livre, usado quando o laboratório não retornou um valueQuantity válido"
      - name: status
        description: "Status do exame, traduzido"
      - name: data_exame
        description: "Data e hora em que o exame foi realizado, horário de Brasília"
  - name: fato_exame_imagem
    description: >
      Fato de exames de imagem (ultrassom, ressonância, tomografia, ECG,
      mamografia, densitometria óssea, entre outros). Aplica "mais novo
      ganha" por observation_id. Laudo em texto livre e anexo são campos
      sensíveis (LGPD). Usa effective_datetime (data de realização do
      exame), não issued (data de lançamento do laudo no sistema).
    columns:
      - name: id_exame
        description: "Identificador único do exame (chave primária do fato)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou o exame (profissional ou paciente)"
      - name: tipo_registrante
        description: "Tipo do registrante: Profissional ou Paciente"
      - name: nome_registrante
        description: "Nome de quem registrou o exame, sem registro profissional colado"
      - name: nome_exame
        description: "Nome do exame de imagem (ultrassom, ressonância, tomografia, etc.)"
      - name: laudo_texto
        description: "Laudo do exame em texto livre — dado sensível (LGPD)"
      - name: attachment_url
        description: "URL do anexo do laudo, quando o resultado foi enviado como imagem/foto"
      - name: attachment_title
        description: "Título do arquivo anexado"
      - name: status
        description: "Status do exame, traduzido"
      - name: data_exame
        description: "Data em que o exame foi realizado (effective_datetime), horário de Brasília"
