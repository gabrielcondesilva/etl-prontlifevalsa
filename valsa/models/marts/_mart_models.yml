version: 2

models:
  - name: qualidade_exame_fisico
    description: >
      Tabela de qualidade de dados para pressão arterial registrada no
      fato_exame_fisico. Contém apenas medições com valores fisiologicamente
      implausíveis, para investigação do time clínico. Regra de flag
      (pressao_suspeita): dispara quando pressao_sistolica < pressao_diastolica
      (sistólica não pode ser menor que diastólica), ou pressao_sistolica < 30
      (valor implausível), ou pressao_diastolica > 200 (valor implausível).
      Ordenada por data_medicao decrescente (mais recentes primeiro).
    columns:
      - name: id_medicao
        description: "Identificador único da medição (referência ao fato_exame_fisico)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos)"
      - name: id_registrante
        description: "ID de quem registrou a medição"
      - name: nome_registrante
        description: "Nome de quem registrou a medição"
      - name: nome_exame
        description: "Tipo de pressão arterial (sentado ou deitado)"
      - name: pressao_sistolica
        description: "Valor da pressão sistólica registrada"
      - name: pressao_diastolica
        description: "Valor da pressão diastólica registrada"
      - name: pressao_media
        description: "Pressão arterial média, quando disponível"
      - name: data_medicao
        description: "Data e hora da medição, horário de Brasília"
      - name: pressao_suspeita
        description: "Sempre true nesta tabela — flag de valor fisiologicamente implausível"
  - name: qualidade_exame_lab
    description: >
      Tabela de qualidade de dados para creatinina, hemoglobina e LDL no
      fato_exame_lab. Contém apenas exames com resultado disponível só
      em texto (sem número convertido) ou com valor numérico fora da
      faixa fisiologicamente plausível, para investigação do time clínico.
      Regras de discrepância: Creatinina < 0.1 ou > 15 mg/dL; Hemoglobina
      < 3 ou > 22 g/dL; LDL < 0 ou > 500 mg/dL.
    columns:
      - name: id_exame
        description: "Identificador único do exame (referência ao fato_exame_lab)"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: nome_exame
        description: "Nome do exame: Creatinina (Cr), Hemoglobina (Hb) ou LDL"
      - name: valor_resultado
        description: "Valor numérico do resultado, quando disponível"
      - name: resultado_texto
        description: "Resultado em texto, quando o valor não pôde ser convertido para número"
      - name: unidade
        description: "Unidade do resultado"
      - name: status
        description: "Status do exame"
      - name: data_exame
        description: "Data e hora do exame, horário de Brasília"
      - name: resultado_apenas_texto
        description: "Flag: true quando o resultado existe só em texto, sem valor numérico"
      - name: valor_discrepante
        description: "Flag: true quando o valor numérico está fora da faixa fisiologicamente plausível"
  - name: questionario_evento_adverso
    description: >
      Mart pivotada do questionário "Evento Adverso", derivada de
      resposta_evento_adverso. Uma linha por submissão (id_resposta),
      com as principais perguntas transformadas em colunas para
      facilitar consumo direto em ferramentas de análise (Power BI).
      Não substitui o fato granular — para perguntas não cobertas
      aqui, ou para auditoria completa, consultar diretamente
      resposta_evento_adverso.
    columns:
      - name: id_resposta
        description: "Identificador da submissão completa do questionário (QuestionnaireResponse). Chave primária da mart."
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento onde o evento foi registrado (fato_atendimentos)"
      - name: nome_autor
        description: "Nome do profissional que registrou a submissão, sem cargo/registro colado"
      - name: data_resposta
        description: "Data e hora em que a submissão foi registrada (authored), horário de Brasília"
      - name: status
        description: "Status da submissão, traduzido (Concluído/Em andamento/Erro de registro)"
      - name: ocorrencia_evento_adverso
        description: "Resposta à pergunta 'Ocorrência de evento adverso?' (Sim/Não)"
      - name: natureza_evento
        description: "Resposta à pergunta 'Natureza do evento' (ex: Queda, Infecção), preenchida apenas quando ocorrencia_evento_adverso = Sim"
      - name: ciencia_notificacao
        description: "Resposta à pergunta sobre ciência da necessidade de notificação à ANVISA e ao Núcleo de Segurança do Paciente (NSP)"
      - name: observacao_outros
        description: "Texto livre do campo 'Outros' — usado tanto para detalhar o evento adverso quanto para registros gerais de monitoramento/contato"
  - name: pressao_arterial
    description: >
      Mart que consolida todas as aferições de pressão arterial provenientes
      dos questionários clínicos e do exame físico. Cada linha representa
      uma aferição de pressão arterial, padronizada em uma única estrutura
      para consumo analítico no Power BI, preservando a origem do registro.

    columns:
      - name: id_resposta
        description: "Identificador da resposta do questionário ou da medição do exame físico."
        tests:
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)."
        tests:
          - not_null

      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos), quando existente."

      - name: pressao_sistolica
        description: >
          Valor da pressão arterial sistólica (mmHg), padronizado como inteiro.
          Caso os valores de sistólica e diastólica estejam invertidos na origem,
          a mart corrige automaticamente mantendo o maior valor como sistólica.
        tests:
          - not_null

      - name: pressao_diastolica
        description: >
          Valor da pressão arterial diastólica (mmHg), padronizado como inteiro.
          Caso os valores de sistólica e diastólica estejam invertidos na origem,
          a mart corrige automaticamente mantendo o menor valor como diastólica.
        tests:
          - not_null

      - name: data_afericao
        description: "Data e hora da aferição da pressão arterial."
        tests:
          - not_null

      - name: origem
        description: >
          Origem da aferição de pressão arterial, indicando o questionário
          clínico ou exame físico de onde o registro foi obtido.
        tests:
          - not_null
          - accepted_values:
              values:
                - "APS - Acolhimento Enfermagem"
                - "Avaliação Breve de Risco à Saúde"
                - "Exame Médico - Visita Domiciliar"
                - "VALSA - 1ª Visita Enfermagem"
                - "VALSA - Consulta Médica LC"
                - "VALSA - Intercorrência"
                - "VALSA - Monitoramento de Saúde"
                - "VALSA - Visita Enfermagem Rotina"
                - "VALSA - Visita Médica"
                - "Exame Físico"
  - name: lesoes_visita_enfermagem
    description: >
      Mart que consolida as informações sobre lesões e feridas registradas
      no questionário VALSA - Visita Enfermagem Rotina. Cada linha representa
      uma submissão do questionário (id_resposta), com as principais perguntas
      relacionadas às lesões transformadas em colunas para facilitar o consumo
      analítico no Power BI.

    columns:
      - name: id_resposta
        description: "Identificador único da submissão do questionário."
        tests:
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)."
        tests:
          - not_null

      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos), quando existente."

      - name: data_resposta
        description: "Data e hora em que a resposta do questionário foi registrada."
        tests:
          - not_null

      - name: status
        description: "Status da submissão do questionário."

      - name: apresenta_lesao
        description: "Indica se o paciente apresenta alguma lesão ou ferida."

      - name: tipo_lesao
        description: "Tipo da lesão ou ferida informada."

      - name: descricao_lesao
        description: "Descrição livre da lesão."

      - name: regiao_lesao
        description: "Descrição da região anatômica onde a lesão está localizada."

      - name: grau_lesao
        description: "Grau da lesão informado no questionário."

      - name: extensao_lesao
        description: "Extensão da lesão."

      - name: leito_lesao
        description: "Características do leito da lesão."

      - name: evolucao_lesao
        description: "Descrição da evolução da lesão."

      - name: ja_trata_lesao
        description: "Indica se o paciente já realiza tratamento para a lesão."
  - name: encaminhamentos
    description: >
      Mart de encaminhamentos médicos para consumo no Power BI.
      Deriva de fato_encaminhamento enriquecida com nome e
      especialidade do profissional solicitante (dim_profissionais).
      Não inclui CIDs — o relacionamento com diagnósticos deve ser
      feito no Power BI via id_atendimento com fato_diagnosticos,
      para evitar multiplicação de linhas por múltiplos CIDs por
      atendimento.
    columns:
      - name: id_encaminhamento
        description: "Identificador único do encaminhamento"
        tests:
          - unique
          - not_null
      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)"
      - name: id_atendimento
        description: "Referência ao atendimento onde o encaminhamento foi solicitado — usar para relacionar com fato_diagnosticos no Power BI"
      - name: especialidade_encaminhada
        description: "Especialidade para a qual o paciente foi encaminhado"
      - name: id_solicitante
        description: "ID do profissional que solicitou o encaminhamento (dim_profissionais)"
      - name: nome_solicitante
        description: "Nome completo do profissional solicitante"
      - name: especialidade_solicitante
        description: "Especialidade do profissional que fez a solicitação"
      - name: status_encaminhamento
        description: "Status atual do encaminhamento"
      - name: motivo_encaminhamento
        description: "Motivo clínico descrito para o encaminhamento"
      - name: data_solicitacao
        description: "Data em que o encaminhamento foi solicitado"
  - name: vacinas
    description: >
      Mart que consolida os registros de vacinação provenientes do
      questionário VALSA - Visita Enfermagem Rotina. Cada linha representa
      uma vacina registrada para um paciente, padronizando os nomes das
      vacinas e preservando a data de administração, permitindo análises
      temporais e acompanhamento da cobertura vacinal.

    columns:
      - name: id_resposta
        description: "Identificador da submissão do questionário."
        tests:
          - not_null

      - name: id_paciente
        description: "Referência ao paciente (dim_pacientes)."
        tests:
          - not_null

      - name: id_atendimento
        description: "Referência ao atendimento (fato_atendimentos), quando existente."

      - name: vacina
        description: >
          Nome padronizado da vacina registrada. Atualmente contempla
          Influenza e Pneumocócicas.

        tests:
          - not_null
          - accepted_values:
              values:
                - "Influenza"
                - "Pneumocócicas"

      - name: data_administracao
        description: >
          Data em que a vacina foi administrada. Utilizada como referência
          para os indicadores mensais e anuais de vacinação.

        tests:
          - not_null

      - name: administrada_valsa
        description: >
          Indica se a vacina foi administrada pela equipe da VALSA.

      - name: vacinas_em_dia
        description: >
          Resposta à pergunta "Vacinas em dia?".

      - name: calendario_vacinal_atualizado
        description: >
          Indica se o paciente possui o calendário vacinal atualizado.

      - name: data_resposta
        description: >
          Data e hora da submissão do questionário.

        tests:
          - not_null

      - name: status
        description: >
          Status da submissão do questionário.

        tests:
          - not_null
          - accepted_values:
              values:
                - "Concluído"
